version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: reservely-postgres
    environment:
      POSTGRES_USER: reservely
      POSTGRES_PASSWORD: reservely
      POSTGRES_DB: reservely
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U reservely']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
